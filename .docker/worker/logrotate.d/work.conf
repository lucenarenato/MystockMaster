# Logs principais do Laravel
"/var/www/html/storage/logs/*.log" {
    su www-data www-data
    daily
    rotate 7
    maxsize 50M
    missingok
    notifempty
    copytruncate
    dateext
    dateformat .%Y-%m-%d
    # compress
    create 644 www-data www-data
}

# Logs de jobs do Laravel
"/var/www/html/storage/logs/jobs/*.log" {
    su www-data www-data
    daily
    rotate 7
    maxsize 50M
    missingok
    notifempty
    copytruncate
    dateext
    dateformat .%Y-%m-%d
    # compress
    create 644 www-data www-data
}
